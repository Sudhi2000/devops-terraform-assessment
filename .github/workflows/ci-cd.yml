name: CI-CD-Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install
        working-directory: ./app


  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Run Tests
        run: npm test
        working-directory: ./app


  static-analysis:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Run ESLint
        run: |
          npm install eslint
          npx eslint . || true
        working-directory: ./app


  security-scan:
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - uses: actions/checkout@v3

      - name: Dependency Security Scan
        run: npm audit --audit-level=high || true
        working-directory: ./app


  docker-build-push:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }} ./app
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
          ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
         image-ref: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest


  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | \
            sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            sudo docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

            sudo docker stop app || true
            sudo docker rm app || true

            sudo docker run -d -p 3000:3000 --restart unless-stopped --name app \
              ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

  notify:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Deployment Notification
        run: echo "Deployment completed successfully 🚀"